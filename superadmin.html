<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f59e0b">
  <title>EduTrack · Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{--bg:#0b1120;--surf:#1a2235;--tx:#e2e8f0;--tx3:#64748b;--gold:#f59e0b;--teal:#0fd4c0;--rose:#f43f5e}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Plus Jakarta Sans",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
    #splash{position:fixed;inset:0;z-index:7000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
    .spl-icon{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--gold),#f59e0b);display:flex;align-items:center;justify-content:center;font-size:34px}
    .spl-name{font-size:26px;font-weight:800}
    .spl-spin{width:36px;height:36px;border-radius:50%;border:3px solid var(--surf);border-top-color:var(--gold);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #sa-login{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;align-items:center;justify-content:center}
    #sa-login.open{display:flex}
    .login-box{background:var(--surf);border:1px solid #2a3650;border-radius:12px;padding:32px 28px;width:100%;max-width:380px}
    .login-title{font-size:20px;font-weight:800;margin-bottom:16px;text-align:center}
    .login-sub{font-size:13px;color:var(--tx3);margin-bottom:20px;text-align:center}
    #google-sa-btn{display:flex;justify-content:center;margin-bottom:12px}
    header{position:sticky;top:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(11,17,32,.9);border-bottom:1px solid #2a3650;z-index:200}
    .h-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px}
    .h-logo-ic{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#f59e0b);display:flex;align-items:center;justify-content:center;font-size:16px}
    .logout-btn{padding:8px 14px;border-radius:12px;border:1px solid rgba(244,63,94,.3);background:rgba(244,63,94,.12);color:var(--rose);font-size:13px;font-weight:600;cursor:pointer}
    .page{padding:20px 16px 40px;display:none;min-height:calc(100vh - 60px)}
    .page.on{display:block}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
    .stat-p{background:var(--surf);border:1px solid #2a3650;border-radius:12px;padding:14px;text-align:center}
    .stat-n{font-size:26px;font-weight:600;color:var(--gold)}
    .stat-l{font-size:11px;color:var(--tx3);margin-top:4px}
    .card{background:var(--surf);border:1px solid #2a3650;border-radius:12px;overflow:hidden;margin-bottom:16px}
    .card-head{padding:14px 18px;border-bottom:1px solid #2a3650;font-weight:700;font-size:13px;display:flex;justify-content:space-between}
    .card-body{padding:18px}
    .school-card{background:var(--surf);border:1px solid #2a3650;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
    .sc-ic{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#38bdf8);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .sc-info{flex:1}
    .sc-name{font-weight:700;font-size:15px}
    .sc-meta{font-size:11px;color:var(--tx3);margin-top:2px;font-family:"JetBrains Mono",monospace}
    .btn{padding:8px 14px;border-radius:12px;border:1px solid #2a3650;background:#111827;color:var(--tx3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn:hover{border-color:var(--teal);color:var(--teal)}
    .attr{text-align:center;padding:20px 16px 10px;font-size:11px;color:var(--tx3)}
    .attr span{color:var(--gold);font-weight:700}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);z-index:9999;background:var(--surf);border:1px solid #2a3650;border-radius:100px;padding:11px 22px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="splash">
  <div class="spl-icon">⭐</div>
  <div class="spl-name">Super Admin</div>
  <div class="spl-spin"></div>
</div>

<div id="sa-login" class="open">
  <div class="login-box">
    <div style="font-size:36px;text-align:center;margin-bottom:10px">⭐</div>
    <div class="login-title">Super Admin Panel</div>
    <div class="login-sub">Manage all schools and administrators</div>
    <div id="google-sa-btn"></div>
    <a href="index.html" style="display:block;text-align:center;padding:8px 14px;margin-top:14px;text-decoration:none;color:var(--tx3);font-size:13px;border:1px solid #2a3650;border-radius:12px;background:#111827">← Back to App</a>
  </div>
</div>

<header id="main-header" style="display:none">
  <div class="h-logo">⭐ EduTrack <span style="font-size:11px;color:var(--gold);margin-left:4px">⭐ SUPER ADMIN</span></div>
  <button class="logout-btn" onclick="handleSALogout()">🚪 Sign Out</button>
</header>

<div class="page" id="main-page" style="display:none">
  <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:100px;font-size:11px;font-weight:700;color:var(--gold);margin-bottom:16px">
    ⭐ Super Admin Panel
  </div>
  <div class="stats">
    <div class="stat-p"><div class="stat-n" id="total-schools">0</div><div class="stat-l">Schools</div></div>
    <div class="stat-p"><div class="stat-n" id="total-teachers">0</div><div class="stat-l">Teachers</div></div>
    <div class="stat-p"><div class="stat-n" id="today-checkins">0</div><div class="stat-l">Today</div></div>
    <div class="stat-p"><div class="stat-n" id="active-sessions">0</div><div class="stat-l">Active</div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <span>🏫 Registered Schools</span>
      <span id="school-count" style="font-size:12px;color:var(--tx3)">0 schools</span>
    </div>
    <div class="card-body" id="schools-list">
      <div style="text-align:center;color:var(--tx3);padding:20px">Loading…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="attr">Powered by <span>Mr. Saisi Nyongesa Sammy</span></div>

<script>
const firebaseConfig={apiKey:"AIzaSyDl0XxDhlF52VVk36i0DvrVLuFrGjwIdhE",authDomain:"clock-in-records.firebaseapp.com",projectId:"clock-in-records",storageBucket:"clock-in-records.firebasestorage.app",messagingSenderId:"643705157075",appId:"1:643705157075:web:03d8def9668b6e8c24ab26"};
const CLIENT_ID="''";
let db,auth,currentUser=null;
firebase.initializeApp(firebaseConfig);auth=firebase.auth();db=firebase.firestore();
function el(id){return document.getElementById(id)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function hideSplash(){const s=el("splash");s.style.opacity="0";setTimeout(()=>s.style.display="none",400)}
function onSignIn(response){verifyGoogleToken(response.credential)}
async function verifyGoogleToken(idToken){try{const cred=firebase.auth.GoogleAuthProvider.credential(idToken);const res=await auth.signInWithCredential(cred);currentUser=res.user;await verifySuperAdmin();showApp();loadData();showToast("✅ Super Admin signed in")}catch(e){showToast("❌ "+e.message)}}
async function verifySuperAdmin(){try{const doc=await db.collection("config").doc("superadmin").get();if(!doc.exists()||doc.data().email!==currentUser.email){await auth.signOut();showToast("❌ Not authorized as Super Admin");el("sa-login").classList.add("open");return false}}catch(e){console.error(e)}return true}
function showAuth(){hideSplash();el("sa-login").classList.add("open");el("main-header").style.display="none";el("main-page").style.display="none";if(window.google){google.accounts.id.initialize({client_id:CLIENT_ID,callback:onSignIn});google.accounts.id.renderButton(el("google-sa-btn"),{theme:"dark",size:"large",width:"100%"})}}
function showApp(){hideSplash();el("sa-login").classList.remove("open");el("main-header").style.display="";el("main-page").style.display=""}
async function handleSALogout(){await auth.signOut();currentUser=null;showAuth();showToast("👋 Signed out")}
async function loadData(){try{const ss=await db.collection("schools").get();const schools=ss.docs.map(d=>({id:d.id,...d.data()}));el("total-schools").textContent=schools.length;el("school-count").textContent=schools.length+" school"+(schools.length!==1?"s":"");let totT=0,todayC=0,actS=0;for(const s of schools){try{const ts=await db.collection("schools").doc(s.id).collection("teachers").get();const rs=await db.collection("schools").doc(s.id).collection("records").get();const sess=await db.collection("schools").doc(s.id).collection("sessions").get();totT+=ts.size;actS+=sess.size;const today=new Date().toDateString();todayC+=rs.docs.filter(d=>new Date(d.data().ts).toDateString()===today&&d.data().type==="in").length}catch(e){}}el("total-teachers").textContent=totT;el("today-checkins").textContent=todayC;el("active-sessions").textContent=actS;renderSchools(schools)}catch(e){console.error(e);el("schools-list").innerHTML='<div style="text-align:center;color:var(--tx3);padding:20px">❌ Error loading</div>'}}
function renderSchools(schools){const c=el("schools-list");if(!schools.length){c.innerHTML='<div style="text-align:center;color:var(--tx3);padding:20px">🏫 No schools</div>';return}c.innerHTML=schools.map(s=>\<div class="school-card"><div class="sc-ic">🏫</div><div class="sc-info"><div class="sc-name">\</div><div class="sc-meta">ID: \ • Admin: \</div></div><button class="btn" onclick="openSchool('\')">Open</button></div>\).join("")}
function openSchool(id){localStorage.setItem("et_school",id);window.location.href="index.html"}
function showToast(msg){const t=el("toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),3200)}
auth.onAuthStateChanged(user=>{if(user){currentUser=user;verifySuperAdmin().then(ok=>{if(ok){showApp();loadData()}else{showAuth()}});currentUser=user}else{showAuth()}});
window.addEventListener("load",()=>setTimeout(hideSplash,2000));
</script>

</body>
</html>
